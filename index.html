<!DOCTYPE html>
<html lang="zh">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>封面生成器 · Cover Maker</title>
  <script src="https://cdn.jsdelivr.net/npm/html-to-image@1.11.11/dist/html-to-image.min.js"></script>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

  <!-- ── Header ── -->
  <header class="app-header">
    <a class="home-link" href="index.html" title="工具箱首页">
      <svg width="15" height="15" viewBox="0 0 15 15" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
        <path d="M1.5 6.5L7.5 1.5L13.5 6.5V13.5H9.5V9.5H5.5V13.5H1.5V6.5Z"/>
      </svg>
    </a>
    <span class="header-logo">封面生成器 · Cover Maker</span>
    <span class="header-ratio" id="ratio-label">5:2 · 1200×480</span>
    <div class="header-spacer"></div>
    <div class="header-actions">
      <button class="btn" onclick="resetAll()">重置</button>
      <button class="btn" id="btn-save-config" onclick="saveConfig()">保存配置</button>
      <button class="btn" id="btn-copy-config" onclick="copyConfig()">Copy 配置</button>
      <button class="btn btn-primary" onclick="exportPng()">下载 PNG</button>
      <button class="btn btn-primary" onclick="copyImage()">复制图片</button>
    </div>
  </header>

  <div class="layout">

    <!-- ── Left panel: content + per-field controls ── -->
    <aside class="panel panel-left">
      <div class="panel-body">

        <!-- Label -->
        <div class="psec">
          <div class="psec-header">
            <span class="psec-title">标签 Label</span>
            <div class="field-actions">
              <button class="vis-toggle on" id="toggle-label" onclick="toggleVis('label')">显示</button>
              <input type="color" class="color-swatch" id="clr-label" value="#93c5fd" title="标签颜色">
            </div>
          </div>
          <div class="field">
            <input id="inp-label" type="text" placeholder="系列标签">
          </div>
          <div class="field">
            <label>字号</label>
            <div class="slider-row">
              <input id="sld-label" type="range" min="0.5" max="4" step="0.1" value="2">
              <span id="val-label" class="slider-val">2 cqi</span>
            </div>
          </div>
        </div>

        <!-- Title -->
        <div class="psec">
          <div class="psec-header">
            <span class="psec-title">标题 Title</span>
            <div class="field-actions">
              <button class="vis-toggle on" id="toggle-title" onclick="toggleVis('title')">显示</button>
              <input type="color" class="color-swatch" id="clr-title" value="#ffffff" title="标题颜色">
            </div>
          </div>
          <div class="field">
            <textarea id="inp-title" class="tall" placeholder="文章标题"></textarea>
          </div>
          <div class="field">
            <label>字号</label>
            <div class="slider-row">
              <input id="sld-title" type="range" min="2" max="9" step="0.1" value="5">
              <span id="val-title" class="slider-val">5 cqi</span>
            </div>
          </div>
          <div class="field">
            <label>行高</label>
            <div class="slider-row">
              <input id="sld-title-lh" type="range" min="1" max="2.5" step="0.05" value="1.5">
              <span id="val-title-lh" class="slider-val">1.5</span>
            </div>
          </div>
          <div class="field">
            <label>上间距</label>
            <div class="slider-row">
              <input id="sld-title-mt" type="range" min="0" max="6" step="0.1" value="0">
              <span id="val-title-mt" class="slider-val">0 cqi</span>
            </div>
          </div>
          <div class="field">
            <label>下间距</label>
            <div class="slider-row">
              <input id="sld-title-mb" type="range" min="0" max="6" step="0.1" value="1.6">
              <span id="val-title-mb" class="slider-val">1.6 cqi</span>
            </div>
          </div>
        </div>

        <!-- Subtitle -->
        <div class="psec">
          <div class="psec-header">
            <span class="psec-title">副标题 Subtitle</span>
            <div class="field-actions">
              <button class="vis-toggle on" id="toggle-subtitle" onclick="toggleVis('subtitle')">显示</button>
              <input type="color" class="color-swatch" id="clr-subtitle" value="#bfdbfe" title="副标题颜色">
            </div>
          </div>
          <div class="field">
            <textarea id="inp-subtitle" placeholder="副标题或摘要"></textarea>
          </div>
          <div class="field">
            <label>字号</label>
            <div class="slider-row">
              <input id="sld-subtitle" type="range" min="1" max="4" step="0.1" value="2">
              <span id="val-subtitle" class="slider-val">2 cqi</span>
            </div>
          </div>
          <div class="field">
            <label>行高</label>
            <div class="slider-row">
              <input id="sld-subtitle-lh" type="range" min="1" max="2.5" step="0.05" value="1.6">
              <span id="val-subtitle-lh" class="slider-val">1.6</span>
            </div>
          </div>
        </div>

        <!-- Author -->
        <div class="psec">
          <div class="psec-header">
            <span class="psec-title">作者 Author</span>
            <div class="field-actions">
              <button class="vis-toggle on" id="toggle-author" onclick="toggleVis('author')">显示</button>
              <input type="color" class="color-swatch" id="clr-meta" value="#bfdbfe" title="作者颜色">
            </div>
          </div>
          <div class="field">
            <input id="inp-author" type="text" placeholder="@xxx · 姓名">
          </div>
        </div>

      </div>
    </aside>

    <!-- ── Center: cover + presets ── -->
    <main class="preview-area">
      <div class="cover-zone">
        <div class="cover-wrapper">
          <div id="cover-main" class="cover">
            <div class="cover-content">
              <span class="label"></span>
              <h1></h1>
              <p class="subtitle"></p>
            </div>
            <div class="meta"></div>
            <!-- Crop overlay -->
            <div id="crop-overlay" class="crop-overlay" style="display: none;">
              <div id="crop-border" class="crop-border">
                <div class="resize-handle nw"></div>
                <div class="resize-handle ne"></div>
                <div class="resize-handle sw"></div>
                <div class="resize-handle se"></div>
                <div class="resize-handle n"></div>
                <div class="resize-handle s"></div>
                <div class="resize-handle w"></div>
                <div class="resize-handle e"></div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Presets below canvas -->
      <div class="presets-strip">
        <div class="presets-label">快速预设 Presets</div>
        <div class="presets-list" id="presets-list"></div>
      </div>
    </main>

    <!-- ── Right panel: visual style controls ── -->
    <aside class="panel panel-right">
      <div class="panel-body">

        <div class="psec">
          <div class="psec-header">
            <span class="psec-title">配色 Color</span>
          </div>
          <div class="color-modes" id="color-section">
            <div class="color-mode">
              <div class="color-mode-label">纯色</div>
              <div class="color-picker">
                <button class="color-btn" data-scheme="0" title="宝蓝" style="background:#1d4ed8"></button>
                <button class="color-btn" data-scheme="1" title="翡翠" style="background:#047857"></button>
                <button class="color-btn" data-scheme="2" title="紫罗兰" style="background:#6d28d9"></button>
                <button class="color-btn" data-scheme="3" title="玫红" style="background:#be123c"></button>
                <button class="color-btn" data-scheme="4" title="石墨" style="background:#334155"></button>
                <button class="color-btn" data-scheme="5" title="琥珀" style="background:#d87757"></button>
                <label class="color-btn color-btn-custom" id="btn-custom-bg" title="自定义颜色">
                  <input type="color" id="inp-custom-bg" value="#1d4ed8">
                </label>
              </div>
            </div>
            <div class="color-mode">
              <div class="color-mode-label">渐变色</div>
              <div class="color-picker">
                <button class="color-btn" data-scheme="12" title="智核"
                  style="background:linear-gradient(135deg,#020617,#1e1b4b)"></button>
                <button class="color-btn active" data-scheme="6" title="海蓝"
                  style="background:linear-gradient(135deg,#1e3a8a,#2563eb)"></button>
                <button class="color-btn" data-scheme="7" title="翠绿"
                  style="background:linear-gradient(135deg,#064e3b,#059669)"></button>
                <button class="color-btn" data-scheme="8" title="深紫"
                  style="background:linear-gradient(135deg,#3b0764,#7c3aed)"></button>
                <button class="color-btn" data-scheme="9" title="玫瑰"
                  style="background:linear-gradient(135deg,#881337,#e11d48)"></button>
                <button class="color-btn" data-scheme="10" title="烈焰"
                  style="background:linear-gradient(135deg,#ea580c,#fbd38d)"></button>
                <button class="color-btn" data-scheme="11" title="午夜"
                  style="background:linear-gradient(135deg,#1e1b4b,#4338ca)"></button>
              </div>
            </div>
          </div>
        </div>

        <div class="psec">
          <div class="psec-header">
            <span class="psec-title">装饰 Decoration</span>
          </div>
          <div class="deco-picker" id="deco-picker">
            <button class="deco-btn active" data-deco="classic">◈ &nbsp;极简几何</button>
            <button class="deco-btn" data-deco="cyberpunk">⬡ &nbsp;赛博朋克</button>
            <button class="deco-btn" data-deco="sphere">◉ &nbsp;AI 球体</button>
            <button class="deco-btn" data-deco="minimal">◎ &nbsp;简约风</button>
          </div>
        </div>

        <div class="psec">
          <div class="psec-header">
            <span class="psec-title">字体 Font</span>
          </div>
          <div class="field">
            <select id="sel-font" title="选择封面字体"></select>
          </div>
        </div>

        <div class="psec">
          <div class="psec-header">
            <span class="psec-title">比例 Ratio</span>
          </div>
          <div class="ratio-picker" id="ratio-picker">
            <button class="ratio-btn active" data-ratio="1200/480" data-label="5:2 · 1200×480">
              <div class="ratio-icon" style="width:38px;height:15px"></div>
              <span>5 : 2</span>
            </button>
            <button class="ratio-btn" data-ratio="3/4" data-label="3:4 · 900×1200">
              <div class="ratio-icon" style="width:22px;height:29px"></div>
              <span>3 : 4</span>
            </button>
            <button class="ratio-btn" data-ratio="16/9" data-label="16:9 · 1200×675">
              <div class="ratio-icon" style="width:38px;height:21px"></div>
              <span>16 : 9</span>
            </button>
            <button class="ratio-btn" data-ratio="2.35/1" data-label="2.35:1 · 公众号 1200×511">
              <div class="ratio-icon" style="width:38px;height:16px"></div>
              <span>2.35 : 1</span>
            </button>
            <button class="ratio-btn" data-ratio="2/1" data-label="2:1 · 1200×600">
              <div class="ratio-icon" style="width:38px;height:19px"></div>
              <span>2 : 1</span>
            </button>
            <button class="ratio-btn" data-ratio="4/3" data-label="4:3 · 1200×900">
              <div class="ratio-icon" style="width:34px;height:25px"></div>
              <span>4 : 3</span>
            </button>
            <button class="ratio-btn" data-ratio="1/1" data-label="1:1 · 1200×1200">
              <div class="ratio-icon" style="width:28px;height:28px"></div>
              <span>1 : 1</span>
            </button>
          </div>
        </div>

        <div class="psec">
          <div class="psec-header">
            <span class="psec-title">内容宽度 Width</span>
          </div>
          <div class="slider-row">
            <input id="sld-width" type="range" min="30" max="95" step="1" value="70">
            <span id="val-width" class="slider-val">70 cqi</span>
          </div>
        </div>

        <!-- 是否裁剪选项 -->
        <div class="psec" id="crop-toggle-section" style="display: none;">
          <div class="psec-header">
            <span class="psec-title">公众号小封面</span>
            <div class="field" style="margin-left: 16px;">
              <div class="switch-group">
                <label class="switch">
                  <input type="checkbox" id="crop-toggle" onchange="setCropEnabled(this.checked)">
                  <span class="switch-slider"></span>
                </label>
                <span class="switch-label" id="crop-label">打开</span>
              </div>
            </div>
          </div>
        </div>

      </div>
    </aside>

  </div><!-- /.layout -->

  <script src="js/main.js"></script>
</body>
</html>
